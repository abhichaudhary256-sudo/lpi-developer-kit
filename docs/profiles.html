<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WINNIIO Intern Cohort — Decision Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;padding:16px;max-width:1200px;margin:0 auto}
h1{color:#58a6ff;font-size:1.6em;margin-bottom:4px}
.subtitle{color:#8b949e;margin-bottom:16px;font-size:.9em}
.controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.controls input[type=text]{background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:8px 12px;border-radius:6px;font-size:.9em;width:240px}
.controls button{padding:8px 16px;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#c9d1d9;cursor:pointer;font-size:.85em;transition:all .15s}
.controls button:hover{background:#30363d}
.controls button.active{background:#388bfd;border-color:#388bfd;color:#fff}
.counts{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;gap:24px;flex-wrap:wrap;font-size:.9em}
.counts span{color:#8b949e}
.counts strong{color:#c9d1d9}
table{width:100%;border-collapse:collapse;font-size:.88em}
thead{position:sticky;top:0;z-index:10}
th{background:#161b22;color:#8b949e;text-align:left;padding:10px 8px;border-bottom:2px solid #30363d;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:#58a6ff}
td{padding:10px 8px;border-bottom:1px solid #21262d;vertical-align:top}
tr:hover td{background:#161b2288}
.rank{color:#8b949e;font-weight:600;text-align:center;width:36px}
.name-cell{font-weight:600;color:#c9d1d9}
.level-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.8em;font-weight:700}
.l4{background:#3fb95022;color:#3fb950;border:1px solid #3fb950}
.l3{background:#58a6ff22;color:#58a6ff;border:1px solid #58a6ff}
.l2{background:#8b949e22;color:#8b949e;border:1px solid #8b949e}
.score-bar{width:100px;height:8px;background:#21262d;border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:6px}
.score-fill{height:100%;border-radius:4px;transition:width .3s}
.tier-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.78em;font-weight:700;white-space:nowrap}
.note-text{color:#8b949e;font-size:.82em;max-width:280px;line-height:1.4}
.note-text:empty{display:none}
select.decision{padding:4px 8px;border-radius:6px;border:1px solid #30363d;font-size:.85em;font-weight:600;cursor:pointer;appearance:auto}
select.decision-ACCEPT{background:#3fb95022;color:#3fb950;border-color:#3fb950}
select.decision-BENCH{background:#ffa65722;color:#ffa657;border-color:#ffa657}
select.decision-WAITLIST{background:#8b949e22;color:#8b949e;border-color:#8b949e}
select.decision-RELEASE{background:#f8514922;color:#f85149;border-color:#f85149}
.note-input{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:4px 8px;border-radius:4px;font-size:.82em;width:100%;margin-top:4px}
.actions{display:flex;gap:12px;margin-top:20px;padding:16px;background:#161b22;border:1px solid #30363d;border-radius:8px;flex-wrap:wrap;align-items:center}
.actions button{padding:10px 20px;border-radius:6px;border:none;font-weight:600;cursor:pointer;font-size:.9em}
.btn-export{background:#388bfd;color:#fff}
.btn-export:hover{background:#58a6ff}
.btn-count{background:#21262d;color:#c9d1d9;border:1px solid #30363d}
.btn-accept-all{background:#238636;color:#fff}
.btn-accept-all:hover{background:#2ea043}
.btn-save{background:#8957e5;color:#fff}
.btn-save:hover{background:#a371f7}
.action-summary{color:#8b949e;font-size:.9em;margin-left:auto}
.flag{color:#d29922;font-weight:600}
.star{color:#e3b341}
@media(max-width:768px){
  table{font-size:.8em}
  .note-text{max-width:160px}
  .score-bar{width:60px}
  .controls{flex-direction:column}

</style>
</head>

let currentFilter = 'all';
let currentSort = 'rank';
let sortAsc = true;

function loadSaved() {
  try {
    const saved = JSON.parse(localStorage.getItem('intern-decisions') || '{}');
    DATA.forEach(d => {
      if (saved[d.key]) {
        if (saved[d.key].decision) d.decision = saved[d.key].decision;
        if (saved[d.key].userNote) d.userNote = saved[d.key].userNote;
      }
    });
  } catch(e) {}
}

function render() {
  const tbody = document.getElementById('tbody');
  const search = document.getElementById('search').value.toLowerCase();
  let filtered = DATA.filter(d => {
    if (currentFilter !== 'all' && d.tier !== currentFilter) return false;
    if (search && !d.name.toLowerCase().includes(search)) return false;
    return true;
  });

  if (currentSort !== 'rank') {
    filtered.sort((a, b) => {
      let va, vb;
      switch(currentSort) {
        case 'name': va = a.name; vb = b.name; break;
        case 'level': va = a.level; vb = b.level; break;
        case 'score': va = a.pct; vb = b.pct; break;
        case 'tier': va = a.tier; vb = b.tier; break;
        case 'decision': va = a.decision; vb = b.decision; break;
        default: va = a.rank; vb = b.rank;
      }
      if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      return sortAsc ? va - vb : vb - va;
    });
  }

  tbody.innerHTML = filtered.map(d => {
    const levelClass = d.level === 4 ? 'l4' : d.level === 3 ? 'l3' : 'l2';
    const barColor = d.pct >= 77 ? '#3fb950' : d.pct >= 69 ? '#ffa657' : d.pct >= 46 ? '#8b949e' : '#f85149';
    const sel = (val) => d.decision === val ? 'selected' : '';
    const flagIcon = d.flag ? ' <span class="flag" title="Needs attention">&#9888;</span>' : '';
    const noteHtml = d.note ? `<div class="note-text">${d.note}</div>` : '';
    return `<tr data-tier="${d.tier}" data-key="${d.key}">
      <td class="rank">${d.rank}</td>
      <td class="name-cell">${d.name}${flagIcon}</td>
      <td><span class="level-badge ${levelClass}">L${d.level}</span></td>
      <td>${d.score}/${d.max} <span style="color:${barColor};font-weight:600">(${d.pct}%)</span>
        <div class="score-bar"><div class="score-fill" style="width:${d.pct}%;background:${barColor}"></div></div>
      </td>
      <td><span class="tier-badge" style="background:${d.tierColor}22;color:${d.tierColor};border:1px solid ${d.tierColor}">${d.tierLabel}</span></td>
      <td>
        ${noteHtml}
        <input class="note-input" placeholder="Add note..." data-key="${d.key}" value="${(d.userNote||'').replace(/"/g,'&quot;')}" oninput="saveNote(this)">
      </td>
      <td>
        <select class="decision decision-${d.decision}" data-key="${d.key}" onchange="updateDecision(this)">
          <option value="ACCEPT" ${sel('ACCEPT')}>ACCEPT</option>
          <option value="BENCH" ${sel('BENCH')}>BENCH</option>
          <option value="WAITLIST" ${sel('WAITLIST')}>WAITLIST</option>
          <option value="RELEASE" ${sel('RELEASE')}>RELEASE</option>
        </select>
      </td>
    </tr>`;
  }).join('');

  updateCounts();
}

function updateDecision(el) {
  const key = el.dataset.key;
  const val = el.value;
  const d = DATA.find(d => d.key === key);
  if (d) d.decision = val;
  el.className = `decision decision-${val}`;
  updateCounts();
  autoSave();
}

function saveNote(el) {
  const key = el.dataset.key;
  const d = DATA.find(d => d.key === key);
  if (d) d.userNote = el.value;
  autoSave();
}

function autoSave() {
  const saved = {};
  DATA.forEach(d => { saved[d.key] = { decision: d.decision, userNote: d.userNote || '' }; });
  localStorage.setItem('intern-decisions', JSON.stringify(saved));
}

function saveToLocal() {
  autoSave();
  document.getElementById('action-summary').textContent = 'Saved to browser! ' + new Date().toLocaleTimeString();
}

function filterByTier(tier) {
  currentFilter = tier;
  document.querySelectorAll('.controls button').forEach(b => b.classList.toggle('active', b.dataset.tier === tier));
  render();
}

function sortTable(col) {
  if (currentSort === col) { sortAsc = !sortAsc; }
  else { currentSort = col; sortAsc = col === 'rank' || col === 'name'; }
  render();
}

function updateCounts() {
  const counts = {ACCEPT:0, BENCH:0, WAITLIST:0, RELEASE:0};
  DATA.forEach(d => counts[d.decision]++);
  document.getElementById('counts').innerHTML =
    `<span>ACCEPT: <strong style="color:#3fb950">${counts.ACCEPT}</strong></span>` +
    `<span>BENCH: <strong style="color:#ffa657">${counts.BENCH}</strong></span>` +
    `<span>WAITLIST: <strong style="color:#8b949e">${counts.WAITLIST}</strong></span>` +
    `<span>RELEASE: <strong style="color:#f85149">${counts.RELEASE}</strong></span>` +
    `<span>Total: <strong>${DATA.length}</strong></span>`;
}

function countDecisions() {
  const counts = {ACCEPT:0, BENCH:0, WAITLIST:0, RELEASE:0};
  DATA.forEach(d => counts[d.decision]++);
  document.getElementById('action-summary').textContent =
    `Accept: ${counts.ACCEPT} | Bench: ${counts.BENCH} | Waitlist: ${counts.WAITLIST} | Release: ${counts.RELEASE}`;
}

function acceptAllAbove(minScore) {
  DATA.forEach(d => {
    if (d.score >= minScore && d.max === 13) d.decision = 'ACCEPT';
  });
  render();
  autoSave();
}

function exportCSV() {
  const header = 'Rank,Name,Level,Score,Max,Pct,Tier,Decision,SystemNote,UserNote';
  const rows = DATA.map(d =>
    `${d.rank},"${d.name}",${d.level},${d.score},${d.max},${d.pct},"${d.tierLabel}","${d.decision}","${d.note.replace(/"/g,'""')}","${(d.userNote||'').replace(/"/g,'""')}"`
  );
  const csv = [header, ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `intern_decisions_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

loadSaved();
render();
</script>
</body></html>
